# How long (in minutes) pnpm waits before using newly published packages.
# This delay helps prevent supply chain attacks by giving time for community verification of new releases.
minimumReleaseAge: 1440 # 1 day

overrides:
  # Security updates
  "ajv@>=7.0.0-alpha.0 <8.18.0": "^8.18.0" # https://github.com/advisories/GHSA-2g4f-4pwh-qvx6
